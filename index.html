    <button id="ai-widget-close" aria-label="Close AI assistant">&#x2715;</button>
    <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
    <script>
      (function () {
        var widget = document.querySelector('elevenlabs-convai');
        var closeBtn = document.getElementById('ai-widget-close');
        if (!widget || !closeBtn) return;
        var isOpen = false;

        function openWidget() {
          if (!isOpen) {
            isOpen = true;
            setTimeout(function () {
              if (window.innerWidth <= 768) closeBtn.classList.add('visible');
            }, 500);
          }
        }

        function closeWidget() {
          isOpen = false;
          closeBtn.classList.remove('visible');
          // Try the widget's own internal close button via shadow DOM
          var shadow = widget.shadowRoot;
          if (shadow) {
            var btns = shadow.querySelectorAll('button');
            for (var i = 0; i < btns.length; i++) {
              var label = ((btns[i].getAttribute('aria-label') || '') + btns[i].textContent).toLowerCase();
              if (label.match(/close|end|dismiss|stop|hang/)) {
                btns[i].click();
                return;
              }
            }
          }
          // Fallback: toggle display to reset the widget
          widget.style.display = 'none';
          setTimeout(function () { widget.style.display = ''; }, 50);
        }

        widget.addEventListener('click', openWidget);
        closeBtn.addEventListener('click', closeWidget);
      })();
    </script>
